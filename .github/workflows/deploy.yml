name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-backend:
    name: Deploy Backend → Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare API token (wrangler whoami)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler whoami

      - name: Set Workers secrets
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.DATABASE_URL }}"        | npx wrangler secret put DATABASE_URL        --name feedback-backend
          echo "${{ secrets.S3_ACCESS_KEY_ID }}"    | npx wrangler secret put S3_ACCESS_KEY_ID    --name feedback-backend
          echo "${{ secrets.S3_SECRET_ACCESS_KEY }}" | npx wrangler secret put S3_SECRET_ACCESS_KEY --name feedback-backend

      - name: Deploy to Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  deploy-frontend:
    name: Deploy Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Workers URL follows the pattern: https://<name>.<account-subdomain>.workers.dev
          # Set WORKERS_URL in GitHub Secrets once the backend is first deployed.
          VITE_API_URL: ${{ secrets.WORKERS_URL }}
        run: npm run build

      - name: Deploy to Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name feedback-frontend
