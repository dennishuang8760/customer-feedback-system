name            = "feedback-backend"
main            = "src/worker.js"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Non-secret runtime vars (override per environment below)
[vars]
NODE_ENV = "production"
S3_ENDPOINT   = "https://eu-central-2.storage.impossibleapi.net"
S3_BUCKET_NAME = "papercone-feedback-attachments"
S3_REGION      = "eu-central-2"

# Secrets must be set via `wrangler secret put` or GitHub Actions:
#   DATABASE_URL
#   S3_ACCESS_KEY_ID
#   S3_SECRET_ACCESS_KEY
